<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="base.css">
    <title>Template Educativo</title>
</head>

<body class="template-educativo">
    <div class="canvas">
        <div class="header">
            <div class="logo-container">
                <img src="assets/logo.png" alt="Sueste Logo" class="logo">
            </div>
            <div class="carousel-indicator">
                <div class="arrow-line"></div>
                <div class="arrow-head"></div>
            </div>
        </div>

        <div class="content">
            <div class="hook">{{hook}}</div>
            <div class="subtitle">{{subtitle}}</div>
        </div>

        <div class="footer">
            <div class="tag">
                <div class="tag-icon"></div>
                <div class="tag-text">Dica Digital</div>
            </div>
            <div class="website">sueste-creative.pt</div>
        </div>
    </div>
</body>

</html>
