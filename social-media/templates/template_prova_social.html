<!DOCTYPE html>
<html lang="pt">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="base.css">
    <title>Template Prova Social</title>
</head>

<body class="template-prova-social">
    <div class="canvas">
        <div class="logo-container">
            <img src="assets/logo.png" alt="Sueste Logo" class="logo">
        </div>

        <div class="carousel-indicator">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round"
                stroke-linejoin="round">
                <path d="m9 18 6-6-6-6" />
            </svg>
        </div>

        <div class="content">
            <div class="hook" style="position: relative;">{{hook}}</div>
            <div class="subtitle">{{subtitle}}</div>
        </div>

        <div class="footer">
            <div class="tag">
                <div class="tag-icon"></div>
                <div class="tag-text">Resultados</div>
            </div>
            <div class="website">sueste-creative.pt</div>
        </div>
    </div>
</body>

</html>
